services:
  - type: worker
    name: linkedin-job-notifier
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python linkedin_telegram_notifier.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: LINKEDIN_PASSWORD
        sync: false
